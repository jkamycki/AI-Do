services:
  - type: web
    name: AI-Do
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://ai-do-aido-orlizb7tn-kamyckijoseph-6037s-projects.vercel.app
      - key: PUBLIC_APP_URL
        value: https://aidowedding.net
      - key: DATABASE_URL
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: INVITATION_SHARE_SECRET
        sync: false
