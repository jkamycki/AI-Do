services:
  - type: web
    name: ai-do-api
    runtime: node
    region: oregon
    plan: standard
    rootDir: .
    buildCommand: pnpm install --filter '@workspace/api-server...' --frozen-lockfile=false --prod=false && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://aidowedding.net
      - key: PUBLIC_APP_URL
        value: https://aidowedding.net
